<section id="education">
  <h1 class="heading mb75px">
    <span><i class="fas fa-graduation-cap"></i></span>
    <span>Education</span>
  </h1>
  <div class="timeline">
    <div *ngFor="let educationItem of educationItems" class="timeline-box">
      <div class="timeline-container">
        <div class="timeline-logo">
          <img
            src="../../../assets/images/college.jpg"
            style="height: 80px; width: 160px"
          />
        </div>
        <h3 class="education-degree">{{ educationItem.degree }}</h3>
        <h4 class="education-college-name">{{ educationItem.college }}</h4>
        <h5 class="education-duration">{{ educationItem.duration }}</h5>
        <p class="education-description">
          {{ educationItem.description }}
        </p>
      </div>
    </div>
    <div class="timeline-divider">
      <div class="timeline-traveller">
        <i class="fas fa-plane fa-2x"></i>
      </div>
    </div>
  </div>
</section>
